<!DOCTYPE html>
<html>
<head>
    <title>Gravity 3D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: fixed; top: 20px; left: 20px; color: #0ff; font-family: Arial; font-size: 24px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

<script type="module">
    import * as THREE from 'three';

    // 1. ESCENA, CÁMARA Y RENDER
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. JUGADOR (Cubo 3D)
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.5 });
    const player = new THREE.Mesh(geometry, material);
    scene.add(player);

    // 3. LUCES (Esencial para el 3D)
    const light = new THREE.PointLight(0xffffff, 50);
    light.position.set(0, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 4. EL TÚNEL / PISO
    const floorGeo = new THREE.BoxGeometry(100, 0.5, 10);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.y = -3;
    scene.add(floor);

    const ceil = new THREE.Mesh(floorGeo, floorMat);
    ceil.position.y = 3;
    scene.add(ceil);

    // Variables de juego
    let score = 0;
    let gravity = -0.01;
    let velocity = 0;
    let gameActive = true;
    let obstacles = [];

    camera.position.z = 8;
    camera.position.y = 1;

    // 5. OBSTÁCULOS 3D
    function spawnObstacle() {
        const obsGeo = new THREE.BoxGeometry(1, Math.random() * 3 + 1, 1);
        const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0055 });
        const obs = new THREE.Mesh(obsGeo, obsMat);
        obs.position.x = 15;
        obs.position.y = Math.random() > 0.5 ? 2 : -2;
        scene.add(obs);
        obstacles.push(obs);
    }

    function animate() {
        if (gameActive) {
            requestAnimationFrame(animate);

            // Gravedad y movimiento
            velocity += gravity;
            player.position.y += velocity;

            // Colisión con suelo/techo
            if (player.position.y < -2.5) { player.position.y = -2.5; velocity = 0; }
            if (player.position.y > 2.5) { player.position.y = 2.5; velocity = 0; }

            // Rotación del cubo para que se vea 3D
            player.rotation.x += 0.05;
            player.rotation.y += 0.05;

            // Mover obstáculos
            obstacles.forEach((obs, index) => {
                obs.position.x -= 0.15;
                
                // Colisión real 3D
                if (player.position.distanceTo(obs.position) < 1.2) {
                    gameActive = false;
                    alert("GAME OVER! Score: " + Math.floor(score));
                    location.reload();
                }

                if (obs.position.x < -10) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                }
            });

            if (Math.random() < 0.02) spawnObstacle();
            
            score += 0.1;
            document.getElementById('score').innerText = Math.floor(score);
        }
        renderer.render(scene, camera);
    }

    // Control
    window.addEventListener('pointerdown', () => {
        gravity = -gravity;
        player.material.color.set(gravity > 0 ? 0xff00ff : 0x00ffff);
    });

    animate();
</script>
</body>
</html>
