<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 15px; left: 15px; color: #0ff; font-weight: bold; font-size: 24px; pointer-events: none; text-shadow: 0 0 10px #0ff; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f0f; font-size: 32px; text-align: center; display: block; text-shadow: 0 0 15px #f0f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="msg">GRAVITY HACKER<br><small style="font-size:16px; color:#fff">Toca para invertir la gravedad</small></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    let gameActive = false;
    let score = 0;
    let gameSpeed = 6;
    
    const player = {
        x: 60,
        y: 0,
        w: 35,
        h: 35,
        gravity: 0.8,
        velocity: 0,
        onCeiling: false,
        color: '#0ff'
    };

    let obstacles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 100;
    }
    window.addEventListener('resize', resize);
    resize();

    function createObstacle() {
        const height = Math.random() * 120 + 60;
        const isCeiling = Math.random() > 0.5;
        obstacles.push({
            x: canvas.width,
            y: isCeiling ? 0 : canvas.height - height,
            w: 35,
            h: height,
            color: '#f00'
        });
    }

    function resetGame() {
        score = 0;
        gameSpeed = 6;
        obstacles = [];
        player.velocity = 0;
        player.onCeiling = false;
        player.y = canvas.height - 100;
        scoreEl.innerText = score;
    }

    function update() {
        if (!gameActive) return;

        if (player.onCeiling) {
            player.velocity -= player.gravity;
        } else {
            player.velocity += player.gravity;
        }
        
        player.y += player.velocity;

        if (player.y + player.h > canvas.height) {
            player.y = canvas.height - player.h;
            player.velocity = 0;
        } else if (player.y < 0) {
            player.y = 0;
            player.velocity = 0;
        }

        if (Math.random() < 0.025) createObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            
            // COLISIÓN + VIBRACIÓN FUERTE
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameActive = false;
                if (window.navigator.vibrate) window.navigator.vibrate(200); // Vibración de choque
                msgEl.style.display = 'block';
                msgEl.innerHTML = "SISTEMA CAÍDO<br>SCORE: " + Math.floor(score) + "<br><small>Toca para reiniciar</small>";
            }

            if (obs.x + obs.w < 0) obstacles.splice(index, 1);
        });

        score += 0.15;
        scoreEl.innerText = Math.floor(score);
        gameSpeed += 0.0015;
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Decoración Neón Suelo/Techo
        ctx.fillStyle = player.onCeiling ? '#f0f' : '#0ff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(0, 0, canvas.width, 4);
        ctx.fillRect(0, canvas.height - 4, canvas.width, 4);

        // Jugador
        ctx.shadowBlur = 20;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Obstáculos
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#f00';
        ctx.fillStyle = '#f00';
        obstacles.forEach(obs => {
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        });
        
        ctx.shadowBlur = 0;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (!gameActive) {
            resetGame();
            gameActive = true;
            msgEl.style.display = 'none';
        } else {
            player.onCeiling = !player.onCeiling;
            player.color = player.onCeiling ? '#f0f' : '#0ff';
            // VIBRACIÓN SUAVE AL CAMBIAR
            if (window.navigator.vibrate) window.navigator.vibrate(40);
        }
    }, { passive: false });

    loop();
</script>
</body>
</html>
